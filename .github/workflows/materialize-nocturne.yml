name: Materialize Nocturne branch

on:
  push:
    branches: [design/nocturne-visual-overhaul]
    paths: ['.github/workflows/materialize-nocturne.yml']

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/nocturne-visual-overhaul
          fetch-depth: 0
      - name: Recover staged visual-overhaul blobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import base64, json, os, pathlib, urllib.request
          repo = 'coldshalamov/Vamp'
          items = {
              'index.html': '6ee0009e01ee1eb301d16ea4e2c0b7823fcff628',
              'css/nocturne.css': '5609ba6107acc98f4ac729be39972f4160b0f3a0',
              'js/render/nocturne.js': '4796c4a5776c8d4ca55223da18cbaa50a36c0720',
              'visual-lab/index.html': '901f7217763bbf102ec037e9f27c497595ef6d4c',
              'visual-lab/lab.css': 'ae411f011f2651e3901985d55c04258bf656be02',
              'visual-lab/lab.js': 'a8c3a05aab3362bc96acfd614d92eb59900bf45c',
              'visual-lab/README.md': '9d27d621eda2f6ed7069db02cc555e551713ce61',
              'scripts/capture_lab.py': '778343efd86f00698b1843f25733ed66ac04ea1e',
              'scripts/nocturne-smoke.mjs': '17eb184f04f5cadb55c3a5c1b12b92618d7f2c7c',
              'docs/visual-overhaul/README.md': '467ce607cd168a61bd7ce672fa0f73f020670ef4',
              'docs/visual-overhaul/SCORECARD.md': '5451a3278ce98c2047e42e21665d2265601f6d7f',
              'docs/visual-overhaul/COMPONENT_INVENTORY.md': 'a3838cc6fe06432289ffa04613e084f834c4eae2',
              'docs/visual-overhaul/AGENT_PLAYBOOK.md': '8e3a345c36828145216ab6728c10361c84b0baae',
          }
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'User-Agent': 'Vamp-Nocturne-Materializer',
          }
          for path, sha in items.items():
              req = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/git/blobs/{sha}', headers=headers
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  payload = json.load(response)
              target = pathlib.Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(base64.b64decode(payload['content']))
          PY
          rm -f .github/workflows/materialize-nocturne.yml
          git config user.name 'Nocturne visual bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat: establish Nocturne visual direction and executable lab'
          git push origin HEAD:design/nocturne-visual-overhaul
