ignore_all_files_in_gitignore: true

ignored_paths:
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - "coverage/**"
  - ".vite/**"

read_only: false

excluded_tools: []

initial_prompt: |
  Vamp is a browser game project. Preserve active feature work and avoid
  reverting or overwriting uncommitted changes from other agents.

project_name: "Vamp"
languages:
  - typescript
included_optional_tools: []
encoding: utf-8
